<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0a05"/>
      <stop offset="50%" style="stop-color:#1a1005"/>
      <stop offset="100%" style="stop-color:#d8a547"/>
    </linearGradient>

    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" style="stop-color:#c9962e"/>
      <stop offset="30%" style="stop-color:#d8a547"/>
      <stop offset="44%" style="stop-color:#f5dfa0"/>
      <stop offset="50%" style="stop-color:#fffdf5"/>
      <stop offset="56%" style="stop-color:#f5dfa0"/>
      <stop offset="70%" style="stop-color:#d8a547"/>
      <stop offset="100%" style="stop-color:#c9962e"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-600,0;600,0;-600,0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5a5a7a"/>
      <stop offset="50%" style="stop-color:#7d83a1"/>
      <stop offset="100%" style="stop-color:#5a5a7a"/>
    </linearGradient>

    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Particles -->
  <circle cx="100" cy="60" r="1.2" fill="#d8a547" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="60;200;60" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="180" r="1" fill="#fff652" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0" dur="5s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="cy" values="180;30;180" dur="5s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle cx="550" cy="40" r="1.3" fill="#d8a547" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0" dur="8s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="cy" values="40;210;40" dur="8s" repeatCount="indefinite" begin="2s"/>
  </circle>
  <circle cx="800" cy="170" r="1" fill="#d8a547" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0" dur="6s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="cy" values="170;30;170" dur="6s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="1050" cy="90" r="1.2" fill="#fff652" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0" dur="9s" repeatCount="indefinite" begin="3s"/>
    <animate attributeName="cy" values="90;220;90" dur="9s" repeatCount="indefinite" begin="3s"/>
  </circle>

  <!-- Title with shimmer -->
  <text x="600" y="120" font-family="'Segoe UI',Arial,sans-serif" font-size="82" font-weight="800" fill="#8b6914" text-anchor="middle" letter-spacing="6" opacity="0.3">SAMOUR-AI</text>
  <text x="600" y="120" font-family="'Segoe UI',Arial,sans-serif" font-size="82" font-weight="800" fill="url(#shimmer)" text-anchor="middle" letter-spacing="6">SAMOUR-AI</text>

  <!-- Subtitle -->
  <text x="600" y="165" font-family="'Segoe UI',Arial,sans-serif" font-size="16" fill="url(#subGrad)" text-anchor="middle" letter-spacing="10" font-weight="300">AI SAFETY · GOVERNANCE · SECURITY</text>

  <!-- Organic bottom waves (GitHub dark bg = #0d1117) -->
  <path d="M0,260 C60,245 120,240 180,245 C240,250 300,262 360,268 C420,274 480,272 540,265 C600,258 660,248 720,245 C780,242 840,248 900,255 C960,262 1020,268 1080,265 C1140,262 1170,255 1200,250 L1200,300 L0,300 Z" fill="#0d1117" opacity="0.4">
    <animate attributeName="d" dur="8s" repeatCount="indefinite" values="M0,260 C60,245 120,240 180,245 C240,250 300,262 360,268 C420,274 480,272 540,265 C600,258 660,248 720,245 C780,242 840,248 900,255 C960,262 1020,268 1080,265 C1140,262 1170,255 1200,250 L1200,300 L0,300 Z;M0,255 C60,262 120,268 180,265 C240,260 300,250 360,248 C420,246 480,250 540,258 C600,265 660,272 720,270 C780,268 840,260 900,252 C960,248 1020,250 1080,258 C1140,265 1170,268 1200,262 L1200,300 L0,300 Z;M0,260 C60,245 120,240 180,245 C240,250 300,262 360,268 C420,274 480,272 540,265 C600,258 660,248 720,245 C780,242 840,248 900,255 C960,262 1020,268 1080,265 C1140,262 1170,255 1200,250 L1200,300 L0,300 Z"/>
  </path>
  <path d="M0,270 C80,262 160,255 240,258 C320,261 400,270 480,275 C560,280 640,278 720,272 C800,266 880,260 960,262 C1040,264 1120,272 1200,268 L1200,300 L0,300 Z" fill="#0d1117" opacity="0.6">
    <animate attributeName="d" dur="6s" repeatCount="indefinite" values="M0,270 C80,262 160,255 240,258 C320,261 400,270 480,275 C560,280 640,278 720,272 C800,266 880,260 960,262 C1040,264 1120,272 1200,268 L1200,300 L0,300 Z;M0,265 C80,272 160,278 240,275 C320,272 400,264 480,260 C560,256 640,260 720,268 C800,275 880,280 960,276 C1040,272 1120,264 1200,270 L1200,300 L0,300 Z;M0,270 C80,262 160,255 240,258 C320,261 400,270 480,275 C560,280 640,278 720,272 C800,266 880,260 960,262 C1040,264 1120,272 1200,268 L1200,300 L0,300 Z"/>
  </path>
  <path d="M0,282 C100,276 200,272 300,275 C400,278 500,284 600,286 C700,288 800,284 900,280 C1000,276 1100,278 1200,282 L1200,300 L0,300 Z" fill="#0d1117" opacity="0.85">
    <animate attributeName="d" dur="5s" repeatCount="indefinite" values="M0,282 C100,276 200,272 300,275 C400,278 500,284 600,286 C700,288 800,284 900,280 C1000,276 1100,278 1200,282 L1200,300 L0,300 Z;M0,278 C100,283 200,286 300,284 C400,282 500,276 600,274 C700,272 800,276 900,282 C1000,286 1100,284 1200,278 L1200,300 L0,300 Z;M0,282 C100,276 200,272 300,275 C400,278 500,284 600,286 C700,288 800,284 900,280 C1000,276 1100,278 1200,282 L1200,300 L0,300 Z"/>
  </path>
  <path d="M0,290 C150,286 300,284 450,287 C600,290 750,293 900,290 C1050,287 1150,288 1200,290 L1200,300 L0,300 Z" fill="#0d1117">
    <animate attributeName="d" dur="4s" repeatCount="indefinite" values="M0,290 C150,286 300,284 450,287 C600,290 750,293 900,290 C1050,287 1150,288 1200,290 L1200,300 L0,300 Z;M0,288 C150,292 300,294 450,291 C600,288 750,286 900,289 C1050,292 1150,290 1200,288 L1200,300 L0,300 Z;M0,290 C150,286 300,284 450,287 C600,290 750,293 900,290 C1050,287 1150,288 1200,290 L1200,300 L0,300 Z"/>
  </path>
</svg>
