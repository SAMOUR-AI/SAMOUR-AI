<svg xmlns="http://www.w3.org/2000/svg" width="800" height="180" viewBox="0 0 800 180">
  <defs>
    <linearGradient id="sBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d8a547"/>
      <stop offset="100%" style="stop-color:#8b6914"/>
    </linearGradient>
  </defs>

  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.1s" fill="freeze"/>
    <rect x="10" y="10" width="120" height="155" rx="10" fill="none" stroke="#d8a547" stroke-width="1" opacity="0.35"/>
    <text x="70" y="60" font-family="Arial,sans-serif" font-size="34" fill="#d8a547" text-anchor="middle" font-weight="700">5K+</text>
    <text x="70" y="82" font-family="Arial,sans-serif" font-size="11" fill="#7d83a1" text-anchor="middle">test cases</text>
    <text x="70" y="98" font-family="Arial,sans-serif" font-size="11" fill="#7d83a1" text-anchor="middle">99.8% pass</text>
    <rect x="25" y="120" width="0" height="3" rx="2" fill="url(#sBar)" opacity="0.7">
      <animate attributeName="width" values="0;90" dur="1s" begin="0.3s" fill="freeze"/>
    </rect>
  </g>

  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <rect x="145" y="10" width="120" height="155" rx="10" fill="none" stroke="#d8a547" stroke-width="1" opacity="0.35"/>
    <text x="205" y="60" font-family="Arial,sans-serif" font-size="34" fill="#d8a547" text-anchor="middle" font-weight="700">8</text>
    <text x="205" y="82" font-family="Arial,sans-serif" font-size="11" fill="#7d83a1" text-anchor="middle">adversarial</text>
    <text x="205" y="98" font-family="Arial,sans-serif" font-size="11" fill="#7d83a1" text-anchor="middle">categories</text>
    <rect x="160" y="120" width="0" height="3" rx="2" fill="url(#sBar)" opacity="0.7">
      <animate attributeName="width" values="0;90" dur="1s" begin="0.5s" fill="freeze"/>
    </rect>
  </g>

  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.5s" fill="freeze"/>
    <rect x="280" y="10" width="120" height="155" rx="10" fill="none" stroke="#d8a547" stroke-width="1" opacity="0.35"/>
    <text x="340" y="60" font-family="Arial,sans-serif" font-size="34" fill="#d8a547" text-anchor="middle" font-weight="700">6</text>
    <text x="340" y="82" font-family="Arial,sans-serif" font-size="11" fill="#7d83a1" text-anchor="middle">compliance</text>
    <text x="340" y="98" font-family="Arial,sans-serif" font-size="11" fill="#7d83a1" text-anchor="middle">frameworks</text>
    <rect x="295" y="120" width="0" height="3" rx="2" fill="url(#sBar)" opacity="0.7">
      <animate attributeName="width" values="0;90" dur="1s" begin="0.7s" fill="freeze"/>
    </rect>
  </g>

  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.7s" fill="freeze"/>
    <rect x="415" y="10" width="120" height="155" rx="10" fill="none" stroke="#d8a547" stroke-width="1" opacity="0.35"/>
    <text x="475" y="55" font-family="Arial,sans-serif" font-size="14" fill="#d8a547" text-anchor="middle">&lt;</text>
    <text x="475" y="68" font-family="Arial,sans-serif" font-size="26" fill="#d8a547" text-anchor="middle" font-weight="700">200ms</text>
    <text x="475" y="90" font-family="Arial,sans-serif" font-size="11" fill="#7d83a1" text-anchor="middle">p99 latency</text>
    <rect x="430" y="120" width="0" height="3" rx="2" fill="url(#sBar)" opacity="0.7">
      <animate attributeName="width" values="0;90" dur="1s" begin="0.9s" fill="freeze"/>
    </rect>
  </g>

  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.9s" fill="freeze"/>
    <rect x="550" y="10" width="120" height="155" rx="10" fill="none" stroke="#d8a547" stroke-width="1" opacity="0.35"/>
    <text x="610" y="60" font-family="Arial,sans-serif" font-size="18" fill="#d8a547" text-anchor="middle" font-weight="700">Ed25519</text>
    <text x="610" y="82" font-family="Arial,sans-serif" font-size="11" fill="#7d83a1" text-anchor="middle">cryptographic</text>
    <text x="610" y="98" font-family="Arial,sans-serif" font-size="11" fill="#7d83a1" text-anchor="middle">evidence</text>
    <rect x="565" y="120" width="0" height="3" rx="2" fill="url(#sBar)" opacity="0.7">
      <animate attributeName="width" values="0;90" dur="1s" begin="1.1s" fill="freeze"/>
    </rect>
  </g>

  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.1s" fill="freeze"/>
    <rect x="685" y="10" width="100" height="155" rx="10" fill="none" stroke="#d8a547" stroke-width="1" opacity="0.35"/>
    <text x="735" y="60" font-family="Arial,sans-serif" font-size="22" fill="#d8a547" text-anchor="middle" font-weight="700">FR/EN</text>
    <text x="735" y="82" font-family="Arial,sans-serif" font-size="11" fill="#7d83a1" text-anchor="middle">multilingual</text>
    <text x="735" y="98" font-family="Arial,sans-serif" font-size="11" fill="#7d83a1" text-anchor="middle">detection</text>
    <rect x="697" y="120" width="0" height="3" rx="2" fill="url(#sBar)" opacity="0.7">
      <animate attributeName="width" values="0;75" dur="1s" begin="1.3s" fill="freeze"/>
    </rect>
  </g>
</svg>
