<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="sGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b6914"/>
      <stop offset="50%" style="stop-color:#d8a547"/>
      <stop offset="100%" style="stop-color:#8b6914"/>
    </linearGradient>
    <filter id="sg">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="200" fill="transparent"/>

  <!-- Stat 1: Tests -->
  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.2s" fill="freeze"/>
    <rect x="15" y="20" width="120" height="160" rx="12" fill="none" stroke="#d8a547" stroke-width="1" opacity="0.3"/>
    <text x="75" y="70" font-family="'Segoe UI',Arial,sans-serif" font-size="32" fill="#d8a547" text-anchor="middle" font-weight="700" filter="url(#sg)">5K+</text>
    <text x="75" y="95" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#7d83a1" text-anchor="middle">test cases</text>
    <text x="75" y="112" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#7d83a1" text-anchor="middle">passing</text>
    <!-- Animated bar -->
    <rect x="30" y="130" width="0" height="3" rx="1.5" fill="#d8a547" opacity="0.6">
      <animate attributeName="width" values="0;90" dur="1s" begin="0.5s" fill="freeze"/>
    </rect>
  </g>

  <!-- Stat 2: Attack Categories -->
  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.4s" fill="freeze"/>
    <rect x="150" y="20" width="120" height="160" rx="12" fill="none" stroke="#d8a547" stroke-width="1" opacity="0.3"/>
    <text x="210" y="70" font-family="'Segoe UI',Arial,sans-serif" font-size="32" fill="#d8a547" text-anchor="middle" font-weight="700" filter="url(#sg)">8</text>
    <text x="210" y="95" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#7d83a1" text-anchor="middle">adversarial</text>
    <text x="210" y="112" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#7d83a1" text-anchor="middle">categories</text>
    <rect x="165" y="130" width="0" height="3" rx="1.5" fill="#d8a547" opacity="0.6">
      <animate attributeName="width" values="0;90" dur="1s" begin="0.7s" fill="freeze"/>
    </rect>
  </g>

  <!-- Stat 3: Frameworks -->
  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.6s" fill="freeze"/>
    <rect x="285" y="20" width="120" height="160" rx="12" fill="none" stroke="#d8a547" stroke-width="1" opacity="0.3"/>
    <text x="345" y="70" font-family="'Segoe UI',Arial,sans-serif" font-size="32" fill="#d8a547" text-anchor="middle" font-weight="700" filter="url(#sg)">6</text>
    <text x="345" y="95" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#7d83a1" text-anchor="middle">compliance</text>
    <text x="345" y="112" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#7d83a1" text-anchor="middle">frameworks</text>
    <rect x="300" y="130" width="0" height="3" rx="1.5" fill="#d8a547" opacity="0.6">
      <animate attributeName="width" values="0;90" dur="1s" begin="0.9s" fill="freeze"/>
    </rect>
  </g>

  <!-- Stat 4: Latency -->
  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.8s" fill="freeze"/>
    <rect x="420" y="20" width="120" height="160" rx="12" fill="none" stroke="#d8a547" stroke-width="1" opacity="0.3"/>
    <text x="480" y="65" font-family="'Segoe UI',Arial,sans-serif" font-size="18" fill="#d8a547" text-anchor="middle" font-weight="300">&lt;</text>
    <text x="480" y="75" font-family="'Segoe UI',Arial,sans-serif" font-size="28" fill="#d8a547" text-anchor="middle" font-weight="700" filter="url(#sg)">200ms</text>
    <text x="480" y="100" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#7d83a1" text-anchor="middle">p99</text>
    <text x="480" y="117" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#7d83a1" text-anchor="middle">latency</text>
    <rect x="435" y="130" width="0" height="3" rx="1.5" fill="#d8a547" opacity="0.6">
      <animate attributeName="width" values="0;90" dur="1s" begin="1.1s" fill="freeze"/>
    </rect>
  </g>

  <!-- Stat 5: Crypto -->
  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.6s" begin="1.0s" fill="freeze"/>
    <rect x="555" y="20" width="120" height="160" rx="12" fill="none" stroke="#d8a547" stroke-width="1" opacity="0.3"/>
    <text x="615" y="70" font-family="'Segoe UI',Arial,sans-serif" font-size="20" fill="#d8a547" text-anchor="middle" font-weight="700" filter="url(#sg)">Ed25519</text>
    <text x="615" y="95" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#7d83a1" text-anchor="middle">cryptographic</text>
    <text x="615" y="112" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#7d83a1" text-anchor="middle">evidence</text>
    <rect x="570" y="130" width="0" height="3" rx="1.5" fill="#d8a547" opacity="0.6">
      <animate attributeName="width" values="0;90" dur="1s" begin="1.3s" fill="freeze"/>
    </rect>
  </g>

  <!-- Stat 6: Languages -->
  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.6s" begin="1.2s" fill="freeze"/>
    <rect x="690" y="20" width="95" height="160" rx="12" fill="none" stroke="#d8a547" stroke-width="1" opacity="0.3"/>
    <text x="737" y="70" font-family="'Segoe UI',Arial,sans-serif" font-size="24" fill="#d8a547" text-anchor="middle" font-weight="700" filter="url(#sg)">FR/EN</text>
    <text x="737" y="95" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#7d83a1" text-anchor="middle">multilingual</text>
    <text x="737" y="112" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#7d83a1" text-anchor="middle">detection</text>
    <rect x="700" y="130" width="0" height="3" rx="1.5" fill="#d8a547" opacity="0.6">
      <animate attributeName="width" values="0;70" dur="1s" begin="1.5s" fill="freeze"/>
    </rect>
  </g>
</svg>
