<svg xmlns="http://www.w3.org/2000/svg" width="800" height="130" viewBox="0 0 800 130">
  <defs>
    <linearGradient id="fGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b6914"/>
      <stop offset="50%" style="stop-color:#d8a547"/>
      <stop offset="100%" style="stop-color:#8b6914"/>
    </linearGradient>
    <linearGradient id="fPulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d8a547">
        <animate attributeName="stop-color" values="#d8a547;#fff652;#d8a547" dur="2s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#8b6914">
        <animate attributeName="stop-color" values="#8b6914;#d8a547;#8b6914" dur="2s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <rect x="10" y="30" width="130" height="50" rx="8" fill="none" stroke="#7d83a1" stroke-width="1.5" opacity="0.6"/>
  <text x="75" y="60" font-family="Arial,sans-serif" font-size="13" fill="#7d83a1" text-anchor="middle">User Request</text>

  <line x1="145" y1="55" x2="200" y2="55" stroke="url(#fGold)" stroke-width="2" opacity="0.7"/>
  <polygon points="197,49 210,55 197,61" fill="#d8a547" opacity="0.7"/>
  <circle cx="170" cy="55" r="3" fill="#d8a547" opacity="0">
    <animate attributeName="cx" values="145;200" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <rect x="215" y="30" width="110" height="50" rx="8" fill="none" stroke="#7d83a1" stroke-width="1.5" opacity="0.6"/>
  <text x="270" y="60" font-family="Arial,sans-serif" font-size="13" fill="#7d83a1" text-anchor="middle">AI Agent</text>

  <line x1="330" y1="55" x2="390" y2="55" stroke="url(#fGold)" stroke-width="2" opacity="0.7"/>
  <polygon points="387,49 400,55 387,61" fill="#d8a547" opacity="0.7"/>
  <circle cx="360" cy="55" r="3" fill="#d8a547" opacity="0">
    <animate attributeName="cx" values="330;390" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
  </circle>

  <rect x="405" y="15" width="160" height="80" rx="10" fill="none" stroke="url(#fPulse)" stroke-width="2.5"/>
  <text x="485" y="50" font-family="Arial,sans-serif" font-size="12" fill="#d8a547" text-anchor="middle" font-weight="bold">GATE APEX</text>
  <text x="485" y="70" font-family="Arial,sans-serif" font-size="9" fill="#7d83a1" text-anchor="middle">evaluate / decide / sign</text>

  <line x1="570" y1="40" x2="630" y2="30" stroke="#22c55e" stroke-width="2" opacity="0.7"/>
  <polygon points="627,23 640,29 629,35" fill="#22c55e" opacity="0.7"/>

  <line x1="570" y1="70" x2="630" y2="90" stroke="#ef4444" stroke-width="2" opacity="0.7"/>
  <polygon points="627,84 640,91 629,96" fill="#ef4444" opacity="0.7"/>

  <rect x="645" y="10" width="140" height="38" rx="8" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.6"/>
  <text x="715" y="34" font-family="Arial,sans-serif" font-size="13" fill="#22c55e" text-anchor="middle">Safe to execute</text>

  <rect x="645" y="72" width="140" height="38" rx="8" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.6"/>
  <text x="715" y="96" font-family="Arial,sans-serif" font-size="13" fill="#ef4444" text-anchor="middle">Blocked + proof</text>
</svg>
